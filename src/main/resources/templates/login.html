<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ingresar | SpringMarket</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center"
      style="min-height: 100vh;">

<div class="container" style="max-width: 400px;">
    <div class="card shadow border-0">
        <div class="card-header bg-warning text-center fw-bold fs-5 py-3">
            SpringMarket — Ingresa
        </div>
        <div class="card-body p-4">

            <!-- Error de credenciales -->
            <div th:if="${param.error}" class="alert alert-danger py-2">
                Usuario o contraseña incorrectos
            </div>

            <!-- Sesión cerrada -->
            <div th:if="${param.logout}" class="alert alert-success py-2">
                Sesión cerrada correctamente
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="vendedor / comprador"
                           required autofocus/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required/>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">
                    Ingresar
                </button>
            </form>

            <hr/>
            <div class="text-center small text-muted">
                <strong>Vendedor (ADMIN):</strong>
                <code>vendedor / vend123</code><br/>
                <strong>Comprador:</strong>
                <code>comprador / comp123</code>
            </div>
        </div>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="text-muted small">← Volver al marketplace</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
