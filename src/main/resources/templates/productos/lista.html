<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lista de Productos | SpringMarket</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar shadow-sm py-2" style="background-color:#ffe600;">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold" th:href="@{/}">🛒 SpringMarket</a>
        <div class="d-flex gap-2">
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/productos/nuevo}"
               class="btn btn-dark btn-sm">+ Nuevo producto</a>
            <a th:href="@{/}" class="btn btn-outline-dark btn-sm">← Inicio</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4 class="mb-3 fw-bold">📦 Todos los productos</h4>

    <!-- Mensaje flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th sec:authorize="hasRole('ADMIN')">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}"></td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <img th:src="${p.imagenUrl != null ? p.imagenUrl :
                                          'https://placehold.co/40x40?text=P'}"
                             width="40" height="40"
                             style="object-fit:cover; border-radius:6px;"
                             alt="img"/>
                        <span th:text="${p.nombre}" class="fw-semibold"></span>
                    </div>
                </td>
                <td>
                        <span class="badge bg-light text-dark border"
                              th:text="${p.categoria}"></span>
                </td>
                <td th:text="'$' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                        <span th:text="${p.stock}"
                              th:classappend="${p.stock <= 5} ? 'text-danger fw-bold' : ''">
                        </span>
                </td>
                <td>
                    <span th:if="${p.activo}" class="badge bg-success">Activo</span>
                    <span th:if="${!p.activo}" class="badge bg-secondary">Inactivo</span>
                </td>
                <td sec:authorize="hasRole('ADMIN')">
                    <div class="d-flex gap-1">
                        <a th:href="@{/productos/editar/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-primary">Editar</a>
                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('¿Eliminar este producto?')">
                            Borrar
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
        <p class="text-muted">No hay productos registrados.</p>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/productos/nuevo}"
           class="btn btn-warning">+ Publicar producto</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
