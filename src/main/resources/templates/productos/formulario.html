<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Publicar Producto | SpringMarket</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar shadow-sm py-2" style="background-color:#ffe600;">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">🛒 SpringMarket</a>
    </div>
</nav>

<div class="container py-5" style="max-width: 640px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-warning fw-bold fs-5 py-3">
            <!-- Muestra "Editar" si el producto ya tiene ID, "Publicar" si es nuevo -->
            <span th:if="${producto.id != null}">✏️ Editar producto</span>
            <span th:if="${producto.id == null}">📦 Publicar nuevo producto</span>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/productos/guardar}"
                  th:object="${producto}"
                  method="post">

                <!-- Campo oculto con el ID (necesario para la edición) -->
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre del producto *</label>
                    <input type="text"
                           th:field="*{nombre}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid'"
                           placeholder="Ej: iPhone 14 128GB Negro"/>
                    <div class="invalid-feedback" th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción *</label>
                    <textarea th:field="*{descripcion}"
                              class="form-control"
                              th:classappend="${#fields.hasErrors('descripcion')} ? ' is-invalid'"
                              rows="3"
                              placeholder="Describí el producto en detalle..."></textarea>
                    <div class="invalid-feedback" th:errors="*{descripcion}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Precio ($) *</label>
                        <input type="number"
                               step="0.01"
                               min="0.01"
                               th:field="*{precio}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('precio')} ? ' is-invalid'"
                               placeholder="Ej: 150000"/>
                        <div class="invalid-feedback" th:errors="*{precio}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Stock disponible *</label>
                        <input type="number"
                               min="0"
                               th:field="*{stock}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('stock')} ? ' is-invalid'"
                               placeholder="Ej: 10"/>
                        <div class="invalid-feedback" th:errors="*{stock}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Categoría *</label>
                    <select th:field="*{categoria}"
                            class="form-select"
                            th:classappend="${#fields.hasErrors('categoria')} ? ' is-invalid'">
                        <option value="">Seleccionar categoría...</option>
                        <option value="Electrónica">Electrónica</option>
                        <option value="Ropa y Accesorios">Ropa y Accesorios</option>
                        <option value="Hogar y Jardín">Hogar y Jardín</option>
                        <option value="Deportes">Deportes</option>
                        <option value="Juguetes">Juguetes</option>
                        <option value="Libros">Libros</option>
                        <option value="Autos y Motos">Autos y Motos</option>
                        <option value="Alimentos">Alimentos</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{categoria}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">URL de imagen (opcional)</label>
                    <input type="url"
                           th:field="*{imagenUrl}"
                           class="form-control"
                           placeholder="https://ejemplo.com/imagen.jpg"/>
                    <div class="form-text">Dejá vacío para usar imagen de marcador.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning fw-bold px-4">
                        <span th:if="${producto.id != null}">💾 Guardar cambios</span>
                        <span th:if="${producto.id == null}">📢 Publicar</span>
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
